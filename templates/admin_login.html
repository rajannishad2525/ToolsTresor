<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restricted System Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex items-center justify-center text-red-600 font-mono">
    <div class="w-full max-w-sm p-8 border border-red-900 rounded bg-zinc-900 shadow-[0_0_20px_rgba(220,38,38,0.3)]">
        <h1 class="text-2xl font-bold mb-6 text-center tracking-widest animate-pulse">SYSTEM ACCESS</h1>
        
        {% if error %}
        <div class="bg-red-950/50 border border-red-800 text-red-400 px-3 py-2 rounded mb-6 text-xs text-center">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            <input type="email" name="email" required class="w-full bg-black border border-red-900 px-3 py-2 text-white focus:border-red-500 focus:outline-none placeholder-red-900/50" placeholder="ADMIN ID">
            <input type="password" name="password" required class="w-full bg-black border border-red-900 px-3 py-2 text-white focus:border-red-500 focus:outline-none placeholder-red-900/50" placeholder="PASSKEY">
            <button type="submit" class="w-full bg-red-900 hover:bg-red-800 text-black font-bold py-2 rounded transition tracking-wider">AUTHENTICATE</button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="{{ url_for('home') }}" class="text-xs text-zinc-600 hover:text-zinc-400 no-underline">&lt; Return to Public Site</a>
        </div>
    </div>
</body>
</html>
