{% extends "base.html" %}

{% block content %}
<div class="max-w-5xl mx-auto px-8 py-12">
    
    <div class="text-center mb-12">
        <h1 class="text-4xl font-extrabold text-amber-500 mb-4">Image Steganography</h1>
        <p class="text-slate-400 text-lg">Hide secret text messages inside images securely. Only you can reveal them.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-xl hover:border-amber-500/30 transition">
            <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <span class="bg-amber-500/10 p-2 rounded-lg">🔒</span> Hide Message
            </h3>
            
            <form id="encodeForm" class="space-y-5">
                <div>
                    <label class="block text-slate-400 text-sm mb-2 font-medium">1. Upload Image (PNG/JPG)</label>
                    <input type="file" name="image" required accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-500 file:text-slate-900 hover:file:bg-amber-600 transition cursor-pointer bg-slate-950 rounded-lg"/>
                </div>
                
                <div>
                    <label class="block text-slate-400 text-sm mb-2 font-medium">2. Secret Message</label>
                    <textarea name="message" required rows="3" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:border-amber-500 outline-none transition" placeholder="Type your secret here..."></textarea>
                </div>
                
                <input type="hidden" name="action" value="encode">
                
                <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-bold py-3 rounded-lg transition shadow-lg transform hover:scale-[1.02]">
                    Download Secret Image ⬇️
                </button>
            </form>
        </div>

        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-xl hover:border-green-500/30 transition">
            <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <span class="bg-green-500/10 p-2 rounded-lg">🔓</span> Read Message
            </h3>
            
            <form id="decodeForm" class="space-y-5">
                <div>
                    <label class="block text-slate-400 text-sm mb-2 font-medium">1. Upload Secret Image</label>
                    <input type="file" name="image" required accept="image/png" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700 transition cursor-pointer bg-slate-950 rounded-lg"/>
                </div>
                
                <input type="hidden" name="action" value="decode">
                
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition shadow-lg transform hover:scale-[1.02]">
                    Reveal Message 🔍
                </button>
            </form>
            
            <div id="decodeResultContainer" class="hidden mt-6">
                <label class="block text-slate-400 text-xs font-bold uppercase mb-2">Hidden Message Found:</label>
                <div id="decodeResult" class="p-4 bg-slate-950 border border-green-500/30 rounded-lg text-green-400 font-mono text-sm break-all shadow-inner"></div>
            </div>
        </div>

    </div>
</div>

<script>
    // Handle Encode (Hide)
    document.getElementById('encodeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const btn = e.target.querySelector('button');
        const originalText = btn.innerText;
        
        btn.innerText = "Processing...";
        btn.disabled = true;
        
        try {
            const res = await fetch('/api/steganography', { method: 'POST', body: formData });
            if(res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "secret_image.png";
                document.body.appendChild(a);
                a.click();
                a.remove();
                alert("Success! The image with your hidden message has been downloaded.");
            } else {
                alert("Error: Could not hide message. Try a different PNG image.");
            }
        } catch(err) { alert("Server Error"); }
        
        btn.innerText = originalText;
        btn.disabled = false;
    });

    // Handle Decode (Reveal)
    document.getElementById('decodeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const resultBox = document.getElementById('decodeResult');
        const container = document.getElementById('decodeResultContainer');
        const btn = e.target.querySelector('button');
        
        btn.innerText = "Scanning...";
        
        try {
            const res = await fetch('/api/steganography', { method: 'POST', body: formData });
            const data = await res.json();
            
            container.classList.remove('hidden');
            if(data.result) {
                resultBox.innerText = data.result;
            } else {
                resultBox.innerText = "Error: " + (data.error || "Failed to read.");
            }
        } catch(err) { alert("Server Error"); }
        
        btn.innerText = "Reveal Message 🔍";
    });
</script>
{% endblock %}
