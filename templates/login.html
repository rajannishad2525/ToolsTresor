{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Login</h2>
            <p class="text-slate-400 mt-2 text-sm">Enter your credentials to access your account</p>
        </div>
        
        <!-- Error Alert -->
        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-6 text-sm flex items-center gap-2">
            <span>⚠️</span> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
            <div>
                <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
                <input type="email" name="email" required 
                    class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition placeholder-slate-600"
                    placeholder="you@example.com">
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-slate-300 text-sm font-medium">Password</label>
                    <a href="#" class="text-xs text-amber-500 hover:text-amber-400 transition">Forgot Password?</a>
                </div>
                <input type="password" name="password" required 
                    class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition placeholder-slate-600"
                    placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-bold py-3 rounded-lg transition-all transform hover:scale-[1.01] shadow-lg shadow-amber-500/20">
                Sign In
            </button>
        </form>
        
        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-800"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-slate-900 px-2 text-slate-500 font-medium">Or</span></div>
        </div>
        
        <p class="text-center text-slate-400 text-sm">
            Don't have an account? <a href="{{ url_for('signup') }}" class="text-amber-500 hover:underline font-medium">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
