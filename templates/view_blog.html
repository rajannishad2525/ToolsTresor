{% extends "base.html" %}

{% block head %}
    <meta name="description" content="{{ post.meta_description }}">
    <meta name="keywords" content="{{ post.keywords }}">
    <meta property="og:title" content="{{ post.title }}">
    <meta property="og:description" content="{{ post.meta_description }}">
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-8 py-20">
    <a href="{{ url_for('home') }}" class="text-amber-500 hover:underline mb-8 block text-sm font-medium">← Back to Home</a>
    
    <header class="mb-10 border-b border-slate-800 pb-8">
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-4 leading-tight">{{ post.title }}</h1>
        <div class="flex items-center gap-4 text-sm text-slate-500">
            <span>📅 {{ post.created_at.strftime('%d %B, %Y') }}</span>
            <span>•</span>
            <span>👤 Admin</span>
        </div>
    </header>
    
    <article class="prose prose-invert prose-lg max-w-none text-slate-300 leading-loose">
        {{ post.content | safe }}
    </article>
</div>
{% endblock %}
