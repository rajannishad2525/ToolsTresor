{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Create Account</h2>
            <p class="text-slate-400 mt-2 text-sm">Join Toolstresor for free access</p>
        </div>
        
        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-6 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('signup') }}" class="space-y-5">
            <div>
                <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
                <input type="email" name="email" required 
                    class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition placeholder-slate-600"
                    placeholder="you@example.com">
            </div>
            
            <div>
                <label class="block text-slate-300 text-sm font-medium mb-2">Password</label>
                <input type="password" name="password" required 
                    class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition placeholder-slate-600"
                    placeholder="Create a password">
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-bold py-3 rounded-lg transition-all transform hover:scale-[1.01] shadow-lg shadow-amber-500/20">
                Sign Up
            </button>
        </form>
        
        <p class="text-center text-slate-400 text-sm mt-8">
            Already have an account? <a href="{{ url_for('login') }}" class="text-amber-500 hover:underline font-medium">Login</a>
        </p>
    </div>
</div>
{% endblock %}
