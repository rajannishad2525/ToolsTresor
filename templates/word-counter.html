{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-8 py-12">
    
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-amber-500 mb-2">Word Counter</h1>
        <p class="text-slate-400">Count words, characters, and paragraphs instantly.</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-lg p-6 shadow-xl">
        <textarea id="textInput" class="w-full h-64 bg-slate-950 border border-slate-700 rounded-lg p-4 text-white focus:border-amber-500 outline-none resize-none placeholder-slate-600 transition" placeholder="Type or paste your text here..."></textarea>
        
        <div class="mt-6 flex justify-center">
            <button onclick="calculateWords()" class="bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-bold py-3 px-8 rounded-lg transition transform hover:scale-105 shadow-lg">
                Calculate
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8 pt-8 border-t border-slate-800">
            <div class="text-center p-4 bg-slate-800/50 rounded-lg border border-slate-700/50">
                <p class="text-3xl font-bold text-white" id="resWords">0</p>
                <p class="text-xs text-slate-400 uppercase mt-1 tracking-wider">Words</p>
            </div>
            <div class="text-center p-4 bg-slate-800/50 rounded-lg border border-slate-700/50">
                <p class="text-3xl font-bold text-white" id="resChars">0</p>
                <p class="text-xs text-slate-400 uppercase mt-1 tracking-wider">Characters</p>
            </div>
            <div class="text-center p-4 bg-slate-800/50 rounded-lg border border-slate-700/50">
                <p class="text-3xl font-bold text-white" id="resSentences">0</p>
                <p class="text-xs text-slate-400 uppercase mt-1 tracking-wider">Sentences</p>
            </div>
            <div class="text-center p-4 bg-slate-800/50 rounded-lg border border-slate-700/50">
                <p class="text-3xl font-bold text-white" id="resParagraphs">0</p>
                <p class="text-xs text-slate-400 uppercase mt-1 tracking-wider">Paragraphs</p>
            </div>
        </div>
    </div>
</div>

<script>
    async function calculateWords() {
        const text = document.getElementById('textInput').value;
        const btn = document.querySelector('button');
        
        // Show loading state
        btn.innerText = "Calculating...";
        btn.disabled = true;

        try {
            // Send data to Python Backend (app.py)
            const res = await fetch('/api/word-counter', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            });
            
            if (res.ok) {
                const data = await res.json();
                // Update UI with results
                document.getElementById('resWords').innerText = data.words;
                document.getElementById('resChars').innerText = data.characters;
                document.getElementById('resSentences').innerText = data.sentences;
                document.getElementById('resParagraphs').innerText = data.paragraphs;
            } else {
                alert("Server Error. Please check if app.py is running.");
            }
        } catch(e) {
            console.error(e);
            alert("Failed to connect to server.");
        }
        
        // Reset button
        btn.innerText = "Calculate";
        btn.disabled = false;
    }
</script>
{% endblock %}
