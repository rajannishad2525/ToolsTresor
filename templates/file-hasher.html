{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto px-8 py-12 text-center">
    <h1 class="text-4xl font-bold text-amber-500 mb-4">File Integrity Checker</h1>
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-lg">
        <input type="file" id="fileInput" class="mb-6 text-white">
        <button onclick="checkHash()" class="bg-amber-600 text-white px-6 py-2 rounded font-bold">Calculate Hash</button>
        <div id="results" class="mt-6 text-left hidden">
            <p class="text-slate-400 text-xs font-bold">MD5:</p>
            <code id="md5" class="block bg-black p-2 rounded text-green-400 text-xs mb-4"></code>
            <p class="text-slate-400 text-xs font-bold">SHA256:</p>
            <code id="sha256" class="block bg-black p-2 rounded text-blue-400 text-xs"></code>
        </div>
    </div>
</div>
<script>
async function checkHash() {
    const f = document.getElementById('fileInput').files[0];
    if(!f) return alert("Select file");
    const fd = new FormData(); fd.append('file', f);
    const res = await fetch('/api/file-hash', {method:'POST', body:fd});
    const d = await res.json();
    document.getElementById('md5').innerText = d.md5;
    document.getElementById('sha256').innerText = d.sha256;
    document.getElementById('results').classList.remove('hidden');
}
</script>
{% endblock %}
