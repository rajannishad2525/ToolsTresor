{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-8 py-12">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-amber-500 mb-2">Image Compressor</h1>
        <p class="text-slate-400">Reduce image size without losing quality.</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-lg p-8 shadow-xl text-center">
        <input type="file" id="imgInput" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-500 file:text-slate-900 hover:file:bg-amber-600 mb-6"/>
        
        <button onclick="compress()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg transition">Compress & Download</button>
    </div>
</div>

<script>
    async function compress() {
        const fileInput = document.getElementById('imgInput');
        if(fileInput.files.length === 0) return alert("Select an image first!");

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        const res = await fetch('/api/image-compressor', { method: 'POST', body: formData });
        if(res.ok) {
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "compressed-image.jpg";
            document.body.appendChild(a);
            a.click();
            a.remove();
        } else {
            alert("Compression Failed");
        }
    }
</script>
{% endblock %}
