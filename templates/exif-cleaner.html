{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-8 py-12 text-center">
    <h1 class="text-4xl font-bold text-amber-500 mb-2">Exif Metadata Cleaner</h1>
    <p class="text-slate-400 mb-10">Remove hidden location & camera data from your photos for privacy.</p>

    <div class="bg-slate-900 border border-slate-800 rounded-lg p-8 shadow-xl max-w-xl mx-auto">
        <div class="mb-6">
            <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">🧹</div>
            <input type="file" id="fileInput" accept="image/jpeg, image/png" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-500 file:text-slate-900 hover:file:bg-amber-600 cursor-pointer bg-slate-950 rounded-lg"/>
        </div>
        
        <button onclick="cleanExif()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition shadow-lg transform hover:scale-[1.02]">
            Clean & Download Image
        </button>
    </div>
</div>

<script>
    async function cleanExif() {
        const fileInput = document.getElementById('fileInput');
        if(fileInput.files.length === 0) return alert("Please select an image!");

        const btn = document.querySelector('button');
        btn.innerText = "Cleaning...";
        btn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            const res = await fetch('/api/exif-cleaner', { method: 'POST', body: formData });
            
            if(res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "clean_" + fileInput.files[0].name;
                document.body.appendChild(a);
                a.click();
                a.remove();
                alert("Metadata Removed Successfully!");
            } else {
                alert("Failed to clean image.");
            }
        } catch(e) { alert("Server Error"); }
        
        btn.innerText = "Clean & Download Image";
        btn.disabled = false;
    }
</script>
{% endblock %}
