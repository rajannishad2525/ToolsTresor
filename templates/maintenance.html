<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Under Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white h-screen flex flex-col items-center justify-center p-4 text-center">
    
    <div class="bg-slate-900 border border-slate-800 p-10 rounded-2xl shadow-2xl max-w-lg transform hover:scale-105 transition duration-500">
        <div class="text-6xl mb-6 animate-bounce">🛠️</div>
        <h2 class="text-3xl font-bold text-amber-500 mb-4">Site Under Maintenance</h2>
        <p class="text-slate-400 text-lg mb-8 leading-relaxed">
            We are currently updating our servers to provide you with a better experience.
            <br>We will be back shortly.
        </p>
        
        <div class="w-full bg-slate-800 rounded-full h-2.5 mb-4 overflow-hidden">
            <div class="bg-amber-500 h-2.5 rounded-full animate-[loading_2s_ease-in-out_infinite]" style="width: 45%"></div>
        </div>
        
        <div class="text-xs text-slate-600 font-mono mt-4 border-t border-slate-800 pt-4">
            Error Code: 503 - Service Unavailable
        </div>
    </div>

    <style>
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
    </style>

</body>
</html>
