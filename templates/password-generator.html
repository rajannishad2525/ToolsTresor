{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-8 py-12">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-amber-500 mb-2">Password Generator</h1>
        <p class="text-slate-400">Create strong and secure passwords instantly.</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-lg p-8 shadow-xl max-w-2xl mx-auto text-center">
        <div class="bg-slate-950 border border-slate-700 rounded-lg p-6 mb-8">
            <p id="passwordResult" class="text-2xl font-mono text-white tracking-wider break-all">CLICK-GENERATE</p>
        </div>

        <div class="flex justify-center gap-6 mb-8 text-slate-300">
            <label><input type="checkbox" id="nums" checked> Numbers</label>
            <label><input type="checkbox" id="syms" checked> Symbols</label>
            <label>Length: <input type="number" id="len" value="12" class="bg-slate-800 w-16 text-center border border-slate-700 rounded ml-2"></label>
        </div>

        <button onclick="generatePass()" class="bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 text-white font-bold py-3 px-8 rounded-lg transition">
            Generate Password
        </button>
    </div>
</div>

<script>
    async function generatePass() {
        const length = document.getElementById('len').value;
        const numbers = document.getElementById('nums').checked;
        const symbols = document.getElementById('syms').checked;

        const res = await fetch('/api/password-generator', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({length: length, numbers: numbers, symbols: symbols})
        });
        const data = await res.json();
        document.getElementById('passwordResult').innerText = data.result;
    }
</script>
{% endblock %}
