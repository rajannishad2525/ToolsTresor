{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-8 py-20">
    
    <a href="{{ url_for('home') }}" class="text-amber-500 hover:text-amber-400 mb-8 inline-flex items-center gap-2 transition-colors">
        ← Back to Home
    </a>

    <div class="bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 rounded-lg p-12 shadow-2xl">
        <h1 class="text-4xl font-bold mb-6 bg-gradient-to-r from-amber-500 to-orange-600 bg-clip-text text-transparent">
            Get in Touch
        </h1>
        
        <p class="text-slate-300 mb-8 text-lg">
            Have questions, suggestions, or feedback? We'd love to hear from you. 
            Send us a message and we'll get back to you as soon as possible.
        </p>

        <form id="contactForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-white font-semibold mb-2 text-sm uppercase tracking-wider">Name</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-lg bg-slate-950 border border-slate-700 text-white placeholder-slate-500 focus:border-amber-500 focus:outline-none transition" placeholder="Your Name" />
                </div>
                <div>
                    <label class="block text-white font-semibold mb-2 text-sm uppercase tracking-wider">Email</label>
                    <input type="email" required class="w-full px-4 py-3 rounded-lg bg-slate-950 border border-slate-700 text-white placeholder-slate-500 focus:border-amber-500 focus:outline-none transition" placeholder="your@email.com" />
                </div>
            </div>

            <div>
                <label class="block text-white font-semibold mb-2 text-sm uppercase tracking-wider">Subject</label>
                <input type="text" required class="w-full px-4 py-3 rounded-lg bg-slate-950 border border-slate-700 text-white placeholder-slate-500 focus:border-amber-500 focus:outline-none transition" placeholder="Message Subject" />
            </div>

            <div>
                <label class="block text-white font-semibold mb-2 text-sm uppercase tracking-wider">Message</label>
                <textarea required rows="6" class="w-full px-4 py-3 rounded-lg bg-slate-950 border border-slate-700 text-white placeholder-slate-500 focus:border-amber-500 focus:outline-none resize-none transition" placeholder="Your Message"></textarea>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-bold py-4 text-lg rounded-lg transition-all transform hover:scale-[1.02] shadow-lg">
                Send Message
            </button>
        </form>
    </div>
</div>

<script>
    // Simple JS for alert only (since this form doesn't have a backend route yet)
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        alert('Thank you for your message! We will get back to you soon.');
        e.target.reset();
    });
</script>
{% endblock %}
