{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto px-8 py-12 text-center">
    <h1 class="text-4xl font-bold text-amber-500 mb-4">PDF Metadata Cleaner</h1>
    <form action="/api/pdf-cleaner" method="POST" enctype="multipart/form-data" class="bg-slate-900 p-8 rounded-lg border border-slate-800">
        <input type="file" name="file" accept="application/pdf" required class="text-white mb-6 block mx-auto">
        <button class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded font-bold">Clean PDF</button>
    </form>
</div>
{% endblock %}
