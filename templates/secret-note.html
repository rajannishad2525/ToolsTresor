{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-8 py-12 text-center">
    <h1 class="text-4xl font-bold text-amber-500 mb-2">Secret Self-Destructing Note</h1>
    <p class="text-slate-400 mb-10">Create a link that deletes itself after being read once.</p>

    <div class="bg-slate-900 border border-slate-800 rounded-lg p-8 shadow-xl max-w-2xl mx-auto">
        <textarea id="noteContent" rows="5" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-4 text-white focus:border-amber-500 outline-none mb-6" placeholder="Write your secret message here..."></textarea>
        
        <button onclick="createNote()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition shadow-lg">
            💣 Create Secret Link
        </button>

        <div id="resultSection" class="hidden mt-8">
            <p class="text-slate-400 text-sm mb-2">Share this link (It will vanish after opening):</p>
            <div class="flex gap-2">
                <input type="text" id="noteLink" readonly class="w-full bg-black border border-green-500/50 text-green-400 p-3 rounded text-sm font-mono">
                <button onclick="navigator.clipboard.writeText(document.getElementById('noteLink').value)" class="bg-slate-800 hover:bg-slate-700 text-white px-4 rounded border border-slate-700">Copy</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function createNote() {
        const content = document.getElementById('noteContent').value;
        if(!content) return alert("Write something first!");
        
        const res = await fetch('/api/create-note', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content: content})
        });
        const data = await res.json();
        
        document.getElementById('noteLink').value = data.link;
        document.getElementById('resultSection').classList.remove('hidden');
    }
</script>
{% endblock %}
