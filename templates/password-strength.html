{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-8 py-12 text-center">
    <h1 class="text-4xl font-bold text-amber-500 mb-2">Password Strength Checker</h1>
    <p class="text-slate-400 mb-10">Check how long it would take to crack your password.</p>

    <div class="bg-slate-900 border border-slate-800 rounded-lg p-8 shadow-xl max-w-xl mx-auto">
        <input type="text" id="passInput" oninput="checkStrength()" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-4 text-white focus:border-amber-500 outline-none mb-6 text-center font-mono text-xl" placeholder="Type a password...">
        
        <div class="h-2 w-full bg-slate-800 rounded-full mb-4 overflow-hidden">
            <div id="strengthBar" class="h-full w-0 transition-all duration-500"></div>
        </div>
        
        <p id="crackTime" class="text-lg font-bold text-white">Enter password to check</p>
    </div>
</div>

<script>
    function checkStrength() {
        const val = document.getElementById('passInput').value;
        const bar = document.getElementById('strengthBar');
        const text = document.getElementById('crackTime');
        
        let score = 0;
        if(val.length > 8) score += 20;
        if(val.length > 12) score += 20;
        if(/[A-Z]/.test(val)) score += 20;
        if(/[0-9]/.test(val)) score += 20;
        if(/[^A-Za-z0-9]/.test(val)) score += 20;

        bar.style.width = score + "%";
        
        if(score < 40) {
            bar.className = "h-full bg-red-500 transition-all duration-500";
            text.innerText = "Very Weak (Instantly Cracked)";
            text.className = "text-red-500 font-bold";
        } else if(score < 80) {
            bar.className = "h-full bg-yellow-500 transition-all duration-500";
            text.innerText = "Medium (Cracked in Weeks)";
            text.className = "text-yellow-500 font-bold";
        } else {
            bar.className = "h-full bg-green-500 transition-all duration-500";
            text.innerText = "Strong (Centuries to Crack)";
            text.className = "text-green-500 font-bold";
        }
    }
</script>
{% endblock %}
