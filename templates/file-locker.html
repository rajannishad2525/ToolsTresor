{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-8 py-12 text-center">
    <h1 class="text-4xl font-bold text-amber-500 mb-2">File Encryption Locker</h1>
    <p class="text-slate-400 mb-10">Encrypt files with a key so no one can open them.</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-lg">
            <h3 class="text-xl font-bold text-white mb-4">🔒 Encrypt File</h3>
            <input type="file" id="encFile" class="mb-4 block w-full text-sm text-slate-500 file:bg-slate-800 file:text-white file:border-0 file:rounded-full file:px-4 file:py-2">
            <button onclick="processFile('encrypt')" class="w-full bg-blue-600 text-white font-bold py-2 rounded">Encrypt & Download</button>
            <div id="keyDisplay" class="hidden mt-4 p-3 bg-black border border-yellow-500 text-yellow-500 text-xs break-all"></div>
        </div>

        <div class="bg-slate-900 border border-slate-800 p-6 rounded-lg">
            <h3 class="text-xl font-bold text-white mb-4">🔓 Decrypt File</h3>
            <input type="file" id="decFile" class="mb-4 block w-full text-sm text-slate-500 file:bg-slate-800 file:text-white file:border-0 file:rounded-full file:px-4 file:py-2">
            <input type="text" id="decKey" placeholder="Enter Key..." class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white mb-4 text-sm">
            <button onclick="processFile('decrypt')" class="w-full bg-green-600 text-white font-bold py-2 rounded">Decrypt & Download</button>
        </div>
    </div>
</div>

<script>
    async function processFile(action) {
        const fileInput = document.getElementById(action === 'encrypt' ? 'encFile' : 'decFile');
        const keyInput = document.getElementById('decKey');
        
        if(fileInput.files.length === 0) return alert("Select a file!");
        
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('action', action);
        if(action === 'decrypt') formData.append('key', keyInput.value);

        const res = await fetch('/api/file-action', { method: 'POST', body: formData });
        const data = await res.json();

        if(data.error) return alert(data.error);

        const binary = atob(data.file_content);
        const bytes = new Uint8Array(binary.length);
        for(let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const blob = new Blob([bytes], {type: "application/octet-stream"});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = data.filename;
        document.body.appendChild(a);
        a.click();
        a.remove();

        if(action === 'encrypt') {
            document.getElementById('keyDisplay').innerText = "SAVE THIS KEY: " + data.key;
            document.getElementById('keyDisplay').classList.remove('hidden');
        }
    }
</script>
{% endblock %}
