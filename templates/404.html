<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Toolstresor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="min-h-screen bg-slate-950 flex flex-col justify-center items-center text-center p-8 relative overflow-hidden">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-amber-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="relative z-10">
            <h1 class="text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-orange-600 mb-4">404</h1>
            <h2 class="text-3xl font-bold text-white mb-4">Page Not Found</h2>
            <p class="text-slate-400 max-w-md mx-auto mb-8 text-lg">
                Oops! The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
            </p>
            
            <a href="index.html" class="inline-flex items-center gap-2 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-bold py-3 px-8 rounded-lg transition-all transform hover:scale-105 shadow-lg shadow-amber-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Return Home
            </a>
        </div>

        <div class="mt-12 text-slate-600 text-sm">
            Error Code: 404 | <a href="contact-us.html" class="hover:text-amber-500 underline">Report Issue</a>
        </div>

    </div>

</body>
</html>
